<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
</head>

<body>

<h2>Choose a Plan</h2>

<button onclick="buy('daily')">Daily Pass</button>
<button onclick="buy('weekly')">Weekly Pass</button>
<button onclick="buy('monthly')">Monthly Pass</button>
<button onclick="buy('six_months')">6 Month Pass</button>
<button onclick="buy('yearly')">Yearly Pass</button>

<script>

async function buy(planId) {

    console.log("CLICKED:", planId);

    try {

        const res = await fetch("https://stripe-backend-hu55.onrender.com/create-checkout-session", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ planId })
        });

        console.log("RESPONSE STATUS:", res.status);

        const data = await res.json();

        console.log("DATA:", data);

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("FAILED: " + JSON.stringify(data));
        }

    } catch (err) {
        console.error("FETCH ERROR:", err);
        alert("Server error");
    }
}
</script>

</body>
</html>
